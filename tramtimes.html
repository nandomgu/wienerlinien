<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tram Times</title>

<style>
body {
    font-family: system-ui, sans-serif;
    background: #f5f5f5;
    margin: 10px;
}

h1 {
    text-align: center;
}

table {
    border-collapse: collapse;
    width: 100%;
    background: white;
}

th, td {
    padding: 10px;
    text-align: left;
    border-bottom: 1px solid #ddd;
}

th {
    background: #333;
    color: white;
}

tr:nth-child(even) {
    background: #f2f2f2;
}

.countdown {
    font-size: 1.4em;
    font-weight: bold;
    text-align: center;
}

.refresh {
    text-align: center;
    margin-top: 10px;
    color: #666;
}
</style>
</head>

<body>

<h1>🚋 Tram Times</h1>

<table id="tramtable"></table>

<div class="refresh">
Auto-refresh every 5 seconds
</div>

<script>

async function loadCSV() {

    const response = await fetch("tramtimes.csv");
    const text = await response.text();

    const rows = text.trim().split("\n").map(r => r.split(","));

    let html = "<tr>";

    rows[0].forEach(h => {
        html += "<th>" + h + "</th>";
    });

    html += "</tr>";

    for (let i = 1; i < rows.length; i++) {

        html += "<tr>";

        rows[i].forEach((cell, j) => {

            if(rows[0][j] === "countdown") {
                html += '<td class="countdown">' + cell + "</td>";
            } else {
                html += "<td>" + cell + "</td>";
            }

        });

        html += "</tr>";
    }

    document.getElementById("tramtable").innerHTML = html;
}

loadCSV();
setInterval(loadCSV, 5000);

</script>

</body>
</html>
